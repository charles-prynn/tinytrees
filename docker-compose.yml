services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    image: migrate/migrate:v4.18.3
    volumes:
      - ./backend/migrations:/migrations:ro
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://app:app@postgres:5432/app?sslmode=disable",
        "up"
      ]
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ./backend
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://app:app@postgres:5432/app?sslmode=disable
      ACCESS_TOKEN_SECRET: change-me-access
      REFRESH_TOKEN_SECRET: change-me-refresh
      ACCESS_TOKEN_TTL: 15m
      REFRESH_TOKEN_TTL: 720h
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8080
    ports:
      - "8080:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
